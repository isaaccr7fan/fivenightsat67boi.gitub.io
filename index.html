class Sfx{constructor(){this.ac=null;this.muted=false;this.hum=null;}
init(){if(this.ac)return;this.ac=new(window.AudioContext||window.webkitAudioContext)();this.startHum();}
tone(f,d,tp='sine',v=0.3,dl=0){if(!this.ac||this.muted)return;
const o=this.ac.createOscillator(),g=this.ac.createGain();o.connect(g);g.connect(this.ac.destination);
o.frequency.value=f;o.type=tp;const t=this.ac.currentTime+dl;
g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);o.start(t);o.stop(t+d);}
startHum(){if(!this.ac||this.muted)return;try{if(this.hum)this.hum.stop();}catch(e){}
const o=this.ac.createOscillator(),g=this.ac.createGain();o.connect(g);g.connect(this.ac.destination);
o.frequency.value=52;o.type='sine';g.gain.value=0.015;o.start();this.hum=o;}
click(){this.tone(800,0.05,'square',0.18);}
door(){this.tone(80,0.4,'square',0.55);}
bang(){this.tone(95,0.5,'square',0.9);this.tone(50,0.7,'sine',0.5,0.08);}
lure(){[523,659,784,659,523].forEach((f,i)=>this.tone(f,0.2,'sine',0.35,i*0.15));}
electro(){for(let i=0;i<12;i++)this.tone(200+Math.random()*800,0.06,'sawtooth',0.5,i*0.02);this.tone(60,0.5,'square',0.8);}
vent(){this.tone(110,0.6,'square',0.85);this.tone(70,0.4,'triangle',0.6,0.1);}
jumpscare(){for(let i=0;i<8;i++){this.tone(80+i*35,0.45,'sawtooth',1.0,i*0.055);this.tone(350-i*25,0.3,'square',0.7,i*0.055+0.025);}}

victory(){[261,330,392,523,659].forEach((f,i)=>this.tone(f,0.35,'triangle',0.4,i*0.18));}

// Draw SCP-096 style "67 Kid" — lanky, pale, long limbs, black eyes, wide jaw scream

  for(let i=0;i<4;i++){X.beginPath();X.moveTo(-15,25+i*12);X.lineTo(15,25+i*12);X.stroke();}

  X.beginPath();X.moveTo(-18,15);X.lineTo(-35+twitch,85);X.lineTo(-28+twitch,90);X.lineTo(-12,20);X.closePath();X.fill();

  // Legs

  X.beginPath();X.ellipse(-11,138,12,5,0,0,Math.PI*2);X.fill();

  // Head — elongated jaw
  X.fillStyle='#d4d0c8';
  X.beginPath();X.moveTo(-20,-10+twitch*0.5);
  X.quadraticCurveTo(-25,-45,0,-48);
  X.quadraticCurveTo(25,-45,20,-10+twitch*0.5);
  X.quadraticCurveTo(25,10,0,18+twitch);

  X.beginPath();X.moveTo(-3,-12);X.lineTo(-3,-5);X.moveTo(3,-12);X.lineTo(3,-5);X.stroke();

// Draw Hawking — wheelchair, hunched, tubes
function drawHawking(cx,cy,scale,alpha,t){
  X.save();X.globalAlpha=alpha||1;X.translate(cx,cy);X.scale(scale*1.6,scale*1.6);
  const zc=Math.sin((t||0)*3)*2;
  // Wheelchair frame
  X.strokeStyle='#555';X.lineWidth=4;
  // Back
  X.beginPath();X.moveTo(-20,0);X.lineTo(-20,60);X.stroke();
  X.beginPath();X.moveTo(20,0);X.lineTo(20,60);X.stroke();
  // Seat
  X.beginPath();X.moveTo(-25,50);X.lineTo(25,50);X.stroke();
  // Footrest
  X.beginPath();X.moveTo(-18,60);X.lineTo(25,60);X.lineTo(25,72);X.stroke();
  // Big rear wheels
  X.strokeStyle='#444';X.lineWidth=5;
  X.beginPath();X.arc(-15,70,28,0,Math.PI*2);X.stroke();
  X.beginPath();X.arc(20,70,18,0,Math.PI*2);X.stroke();
  // Wheel spokes
  X.lineWidth=1.5;X.strokeStyle='#666';
  for(let i=0;i<6;i++){
    X.beginPath();X.moveTo(-15,70);
    X.lineTo(-15+28*Math.cos(i*Math.PI/3),70+28*Math.sin(i*Math.PI/3));X.stroke();
  }
  // Person body — hunched
  X.fillStyle='#3a3a5a';
  X.beginPath();X.moveTo(-22,48);X.quadraticCurveTo(-20+zc,-5,-8,-12);
  X.quadraticCurveTo(8,-16,18,48);X.closePath();X.fill();
  // Head drooped forward
  X.fillStyle='#d4b896';
  X.beginPath();X.ellipse(-4+zc*0.3,-28,16,14,-0.3,0,Math.PI*2);X.fill();
  // Glasses
  X.strokeStyle='#222';X.lineWidth=2;
  X.beginPath();X.arc(-9,-30,7,0,Math.PI*2);X.stroke();
  X.beginPath();X.arc(6,-30,7,0,Math.PI*2);X.stroke();
  X.beginPath();X.moveTo(-2,-30);X.lineTo(2,-30);X.stroke();
  // Eyes behind glasses
  X.fillStyle='#4488ff';
  X.beginPath();X.arc(-9,-30,3,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(6,-30,3,0,Math.PI*2);X.fill();
  if(zc>1){// Electric charge glow
    X.shadowColor='#4488ff';X.shadowBlur=20;
    X.fillStyle='rgba(68,136,255,0.5)';
    X.beginPath();X.arc(-9,-30,5,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(6,-30,5,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
  }
  // Breathing tube
  X.strokeStyle='#aaa';X.lineWidth=2;
  X.beginPath();X.moveTo(8,-24);X.quadraticCurveTo(22,-20,20,0);X.stroke();
  // Speech device box
  X.fillStyle='#222';X.fillRect(14,15,18,14);X.strokeStyle='#555';X.lineWidth=1;X.strokeRect(14,15,18,14);
  // Legs/feet
  X.fillStyle='#3a3a5a';X.fillRect(-16,48,12,22);X.fillRect(4,48,12,22);
  X.fillStyle='#222';X.fillRect(-18,68,14,8);X.fillRect(2,68,14,8);
  X.restore();
}

// Library room — blackboard, chairs, desk (based on public photos description)

  // Blackboard on back wall
  X.fillStyle='#1a2a1a';X.fillRect(fx+fw*0.15,fy+fh*0.05,fw*0.7,fh*0.45);
  X.strokeStyle='#3a4a2a';X.lineWidth=3;X.strokeRect(fx+fw*0.15,fy+fh*0.05,fw*0.7,fh*0.45);

  // Chairs in circle
  const chairData=[{x:0.2,y:0.72},{x:0.35,y:0.8},{x:0.5,y:0.76},{x:0.65,y:0.8},{x:0.8,y:0.72}];
  chairData.forEach(c=>{
    X.fillStyle='#2a1e0e';X.fillRect(fx+c.x*fw-fw*0.04,fy+c.y*fh,fw*0.08,fh*0.06);

  // Books on shelves
  X.fillStyle='#1a0a05';X.fillRect(fx,fy,fw*0.12,fh);X.fillRect(fx+fw*0.88,fy,fw*0.12,fh);
  const bookColors=['#3a0808','#083a08','#08083a','#3a3808','#2a1a08'];
  for(let i=0;i<12;i++){
    X.fillStyle=bookColors[i%5];
    X.fillRect(fx+fw*0.01,fy+fh*(0.05+i*0.075),fw*0.1,fh*0.06);
    X.fillRect(fx+fw*0.89,fy+fh*(0.05+i*0.075),fw*0.1,fh*0.06);

}

// Dental/mask room (described in public records)
function drawRoomDental(fx,fy,fw,fh,t){
  X.fillStyle='#0a0a0c';X.fillRect(fx,fy,fw,fh);

  for(let i=0;i<10;i++)for(let j=0;j<4;j++){

  // DENTAL CHAIR — center of room

  X.fillStyle='#888';X.fillRect(cx-fw*0.12,cy+fh*0.25,fw*0.24,fh*0.06);

  X.fillStyle='#aaa';X.fillRect(cx-fw*0.02,cy,fw*0.04,fh*0.28);

  // Backrest

    X.beginPath();X.ellipse(fx+mx*fw+fw*0.015,my+fh*0.06,fw*0.012,fw*0.014,0,0,Math.PI*2);X.fill();

  X.fillStyle=pw;X.fillRect(fx+fw*0.15,fy+fh*0.55,fw*0.7,fh*0.28);
  X.strokeStyle='#0a3050';X.lineWidth=2;X.strokeRect(fx+fw*0.15,fy+fh*0.55,fw*0.7,fh*0.28);

// Vent shaft — metal tunnel perspective with grate and bolts
function drawRoomVent(fx,fy,fw,fh,t,camId){
  // Background — dark metal shaft
  const bg=X.createLinearGradient(fx,fy,fx,fy+fh);
  bg.addColorStop(0,'#050507');bg.addColorStop(1,'#020203');
  X.fillStyle=bg;X.fillRect(fx,fy,fw,fh);

  // Perspective tunnel walls — converging lines to vanishing point
  const vpx=fx+fw*0.5,vpy=fy+fh*0.45;
  const numLines=10;
  X.strokeStyle='#1a1a20';X.lineWidth=1;
  for(let i=0;i<=numLines;i++){
    const x1=fx+i*(fw/numLines);
    X.beginPath();X.moveTo(x1,fy+fh);X.lineTo(vpx,vpy);X.stroke();
  }
  // Horizontal duct sections (depth rings)
  const ringColors=['#1c1c22','#161618','#111113','#0d0d0f'];
  for(let r=0;r<6;r++){
    const d=(r+1)/7;
    const rx=fx+fw*(0.5-0.5*(1-d)),rw=fw*(1-d);
    const ry=fy+fh*(0.6*(1-d)+0.3),rh=(fh-ry+fy)*0.15*(1-d*0.5);
    X.fillStyle=ringColors[r%4];
    X.fillRect(rx,ry,rw,Math.max(2,rh));
    // Rivet bolts on rings
    X.fillStyle='#2a2a30';
    const bolts=Math.max(2,Math.floor(8*(1-d)));
    for(let b=0;b<bolts;b++){
      const bx=rx+b*(rw/(bolts-1||1));
      X.beginPath();X.arc(bx,ry+rh/2,Math.max(1,3*(1-d)),0,Math.PI*2);X.fill();
    }
  }
  // Shaft walls — metal plates with seam lines
  // Left wall
  const lwG=X.createLinearGradient(fx,0,fx+fw*0.2,0);
  lwG.addColorStop(0,'#1a1a20');lwG.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=lwG;X.fillRect(fx,fy,fw*0.2,fh);
  // Right wall
  const rwG=X.createLinearGradient(fx+fw*0.8,0,fx+fw,0);
  rwG.addColorStop(0,'rgba(0,0,0,0)');rwG.addColorStop(1,'#1a1a20');
  X.fillStyle=rwG;X.fillRect(fx+fw*0.8,fy,fw*0.2,fh);
  // Floor
  const flG=X.createLinearGradient(fx,fy+fh*0.7,fx,fy+fh);
  flG.addColorStop(0,'rgba(0,0,0,0)');flG.addColorStop(1,'#1a1a1e');
  X.fillStyle=flG;X.fillRect(fx,fy+fh*0.7,fw,fh*0.3);

  // Metal seam lines on side walls
  X.strokeStyle='#151518';X.lineWidth=1;
  for(let s=0;s<8;s++){
    const sy=fy+s*fh/8;
    X.beginPath();X.moveTo(fx,sy);X.lineTo(fx+fw*0.18,sy);X.stroke();
    X.beginPath();X.moveTo(fx+fw*0.82,sy);X.lineTo(fx+fw,sy);X.stroke();
  }

  // Ventilation grate in FOREGROUND (bottom of screen) — the player's perspective
  const grateY=fy+fh*0.72;const grateH=fh*0.28;
  // Grate frame
  X.fillStyle='#252530';X.fillRect(fx,grateY,fw,grateH);
  X.strokeStyle='#3a3a48';X.lineWidth=3;X.strokeRect(fx+2,grateY+2,fw-4,grateH-4);
  // Horizontal slats
  const slotH=grateH/9;
  for(let s=0;s<9;s++){
    const sy=grateY+s*slotH;
    // Slat bar (metal)
    const slG=X.createLinearGradient(fx,sy,fx,sy+slotH*0.55);
    slG.addColorStop(0,'#303040');slG.addColorStop(0.5,'#40404e');slG.addColorStop(1,'#252530');
    X.fillStyle=slG;X.fillRect(fx+4,sy+1,fw-8,slotH*0.55);
    // Shadow/gap below slat
    X.fillStyle='#050507';X.fillRect(fx+4,sy+slotH*0.55+1,fw-8,slotH*0.42);
  }
  // Vertical dividers on grate
  for(let v=1;v<5;v++){
    X.fillStyle='#2a2a38';X.fillRect(fx+v*(fw/5)-2,grateY,4,grateH);
  }
  // Corner bolts on grate frame
  [[8,8],[fw-12,8],[8,grateH-12],[fw-12,grateH-12]].forEach(([bx,by])=>{
    X.fillStyle='#4a4a58';X.beginPath();X.arc(fx+bx,grateY+by,5,0,Math.PI*2);X.fill();
    X.strokeStyle='#1a1a28';X.lineWidth=1;X.beginPath();X.arc(fx+bx,grateY+by,5,0,Math.PI*2);X.stroke();
    // Screw slot
    X.strokeStyle='#2a2a38';X.lineWidth=1.5;
    X.beginPath();X.moveTo(fx+bx-3,grateY+by);X.lineTo(fx+bx+3,grateY+by);X.stroke();
  });
  // Ambient drip/rust streaks
  X.strokeStyle='rgba(100,80,40,0.12)';X.lineWidth=1;
  for(let d=0;d<4;d++){
    const dx=fx+fw*(0.15+d*0.22);
    X.beginPath();X.moveTo(dx,grateY);
    for(let y=0;y<grateH;y+=6)X.lineTo(dx+(Math.random()-0.5)*2,grateY+y);
    X.stroke();
  }
  // Ambient light leak from deep in shaft
  const aG=X.createRadialGradient(vpx,vpy,0,vpx,vpy,fw*0.3);
  aG.addColorStop(0,'rgba(0,80,0,0.08)');aG.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=aG;X.fillRect(fx,fy,fw,fh);
  // Flicker
  if(Math.sin(t*7.3)>0.9){X.fillStyle='rgba(255,255,255,0.015)';X.fillRect(fx,fy,fw,fh);}
}

// Hallway corridor
function drawRoomHallway(fx,fy,fw,fh,t,side){

// Server/computer room
function drawRoomServer(fx,fy,fw,fh,t){
  X.fillStyle='#050508';X.fillRect(fx,fy,fw,fh);
  const tc=performance.now()/1000;
  // Server racks
  [[0.04,0.05],[0.25,0.05],[0.55,0.05],[0.76,0.05]].forEach(([rx,ry])=>{
    X.fillStyle='#0d1018';X.fillRect(fx+rx*fw,fy+ry*fh,fw*0.18,fh*0.8);
    X.strokeStyle='#1a1e28';X.lineWidth=2;X.strokeRect(fx+rx*fw,fy+ry*fh,fw*0.18,fh*0.8);

    for(let l=0;l<16;l++){
      const on=Math.sin(tc*3+rx*10+l*0.7)>0;
      const col=l%3===0?'#00ff00':l%3===1?'#ffaa00':'#ff4400';
      X.fillStyle=on?col:'#0a0a0a';
      if(on){X.shadowColor=col;X.shadowBlur=4;}

      X.shadowBlur=0;
    }
    // Drive bays
    X.fillStyle='#0a0c12';
    for(let d=0;d<6;d++)X.fillRect(fx+(rx+0.07)*fw,fy+(ry+0.05+d*0.12)*fh,fw*0.08,fh*0.04);
  });
  // Cable management on floor
  X.strokeStyle='#1a1008';X.lineWidth=fw*0.015;
  X.beginPath();X.moveTo(fx,fy+fh*0.9);
  for(let i=0;i<10;i++)X.lineTo(fx+i*fw/10,fy+fh*(0.88+Math.sin(i*2.3)*0.03));
  X.stroke();
  // Ceiling conduit
  X.strokeStyle='#1a1a20';X.lineWidth=fw*0.02;
  X.beginPath();X.moveTo(fx,fy+fh*0.02);X.lineTo(fx+fw,fy+fh*0.02);X.stroke();
}

//  GAME
// ══════════════════════════════════════════════════
class Game{
  constructor(){
    this.state=ST.LOADING;
    this.night=1;this.deaths=0;
    this.completedNights=[];this.unlockedNight=1;
    this.customAI={epstein:0,trump:0,hawking:0};
    this.loadSave();
    this.resetGameState();
    C.addEventListener('click',e=>{SFX.init();this.click(e);});
    C.addEventListener('touchstart',e=>{e.preventDefault();SFX.init();this.click(e.touches[0]);});
    document.addEventListener('keydown',e=>{SFX.init();this.key(e);});
    setTimeout(()=>{this.state=ST.TITLE;},800);
    this.lastTime=0;
    requestAnimationFrame(t=>this.loop(t));
  }
  loadSave(){try{const d=JSON.parse(localStorage.getItem('fn67boi_v4')||'{}');this.completedNights=d.n||[];this.deaths=d.d||0;this.unlockedNight=this.completedNights.length?Math.min(5,Math.max(...this.completedNights)+1):1;}catch(e){this.completedNights=[];}}
  save(){try{localStorage.setItem('fn67boi_v4',JSON.stringify({n:this.completedNights,d:this.deaths}));}catch(e){}}
  resetGameState(){
    this.power=100;this.gameTime=0;this.gameHour=0;
    this.activeCam='11';
    this.brokenCams=new Set();this.lureActive=null;this.lureTimer=0;
    this.lureHeat={};CAMS.forEach(c=>this.lureHeat[c.id]=0);
    this.epstein={pathIdx:0,moveTimer:0};
    this.trump={ventPhase:0,bangTimer:0,activeVent:null,bangDur:0};
    this.hawking={zapCharge:100,escaped:false,moveTimer:0};
    this.ventLClosed=false;this.ventRClosed=false;
    this.ventBangL=false;this.ventBangR=false;
    this.suffocateTimer=0;
    this.shakeX=0;this.shakeY=0;this.staticAlpha=0;
    this.bangFlash=0;this.electroFlash=0;
    this.glitchLines=[];
    this.jumpscareTimer=0;this.jsBot=null;
    this.panelRepairTarget=null;
    this.phoneLineIdx=0;this.phoneLineTimer=0;
    this.typedText='';this.typedIdx=0;this.typedTimer=0;
    this.warnBlink=false;this.warnTimer=0;
  }
  startNight(n){this.night=n;this.resetGameState();this.state=ST.INTRO;}
  getAI(name){
    if(this.night===6)return this.customAI[name];
    const t={epstein:[4,6,9,13,18,20],trump:[0,5,8,12,16,20],hawking:[0,0,5,9,15,20]};
    let base=(t[name]||[0])[Math.min(this.night-1,5)]||0;
    return Math.min(20,base+this.gameHour*0.7);
  }
  epsteinCam(){return this.epstein.pathIdx<EPSTEIN_PATH.length?EPSTEIN_PATH[this.epstein.pathIdx]:null;}

  update(dt){
    if(dt<=0||dt>150)return;const s=dt/1000;
    this.shakeX*=0.78;this.shakeY*=0.78;
    this.staticAlpha=Math.max(0,this.staticAlpha-s*3);
    this.bangFlash=Math.max(0,this.bangFlash-s*5);
    this.electroFlash=Math.max(0,this.electroFlash-s*4);
    this.warnTimer+=s;this.warnBlink=Math.floor(this.warnTimer*3)%2===0;
    this.glitchLines=this.glitchLines.filter(g=>{g.life-=s;return g.life>0;});
    if(Math.random()<s*1.5)this.glitchLines.push({y:Math.random()*H,h:1+Math.random()*3,off:(Math.random()-0.5)*18,life:0.04+Math.random()*0.1});
    if(this.state===ST.INTRO){this.updatePhone(s);return;}
    if(this.state===ST.JUMPSCARE){this.jumpscareTimer+=s;if(this.jumpscareTimer>3.5)this.state=ST.GAMEOVER;return;}
    if(this.state!==ST.PLAYING)return;
    this.gameTime+=s;
    const prog=Math.min(1,this.gameTime/NIGHT_DURATION);
    this.gameHour=Math.floor(prog*6);
    // Power
    let drain=0.4;
    if(this.lureActive)drain+=0.4;
    if(this.ventLClosed)drain+=0.25;
    if(this.ventRClosed)drain+=0.25;
    drain+=this.brokenCams.size*0.1;
    this.power-=(drain/10)*s;
    if(this.power<=0){this.power=0;this.doJumpscare('epstein');return;}
    // Lure
    if(this.lureActive){
      this.lureTimer-=s;
      if(this.lureTimer<=0){
        this.lureHeat[this.lureActive]=Math.min(100,(this.lureHeat[this.lureActive]||0)+28);
        if(this.lureHeat[this.lureActive]>=100)this.brokenCams.add(this.lureActive);
        this.lureActive=null;
      }
    }
    CAMS.forEach(c=>{if(c.id!==this.lureActive)this.lureHeat[c.id]=Math.max(0,(this.lureHeat[c.id]||0)-s*5);});
    // Epstein AI
    const eAI=this.getAI('epstein');
    this.epstein.moveTimer+=s;
    const eMI=Math.max(1.5,8-eAI*0.3);
    if(this.epstein.moveTimer>=eMI){
      this.epstein.moveTimer=0;
      const camId=this.epsteinCam();
      if(this.lureActive&&camId){
        const lureIdx=EPSTEIN_PATH.indexOf(this.lureActive);
        const curIdx=this.epstein.pathIdx;
        if(lureIdx>=0&&lureIdx<curIdx){this.epstein.pathIdx=Math.max(0,lureIdx);this.lureActive=null;this.staticAlpha=0.4;}
      } else if(Math.random()<eAI/20){
        this.epstein.pathIdx=Math.min(EPSTEIN_PATH.length-1,this.epstein.pathIdx+1);
        this.staticAlpha=0.5;
        if(this.epsteinCam()==='OFFICE'){this.doJumpscare('epstein');return;}
      }
    }
    // Trump AI
    const tAI=this.getAI('trump');
    if(tAI>0){
      if(this.trump.ventPhase===0){
        this.trump.bangTimer+=s;
        if(this.trump.bangTimer>=Math.max(2,12-tAI*0.4)){
          this.trump.bangTimer=0;this.trump.ventPhase=1;
          this.trump.activeVent=Math.random()<0.5?'L':'R';
          this.trump.bangDur=2+Math.random()*2;this.trump.bangTimer=0;
        }
      } else if(this.trump.ventPhase===1){
        this.trump.bangTimer+=s;
        if(Math.random()<s*3){
          SFX.vent();this.shakeX=(Math.random()-0.5)*8;this.bangFlash=0.4;
          if(this.trump.activeVent==='L')this.ventBangL=true;
          else this.ventBangR=true;
        }
        if(this.trump.bangTimer>=this.trump.bangDur){
          this.trump.bangTimer=0;this.ventBangL=false;this.ventBangR=false;
          const closed=(this.trump.activeVent==='L')?this.ventLClosed:this.ventRClosed;
          if(closed)this.trump.ventPhase=0;
          else{this.doJumpscare('trump');return;}
        }
      }
      // Suffocation
      if(this.ventLClosed||this.ventRClosed){this.suffocateTimer+=s*0.5;if(this.suffocateTimer>8){this.doJumpscare('suffocate');return;}}
      else this.suffocateTimer=Math.max(0,this.suffocateTimer-s*2);
    }
    // Hawking AI
    const hAI=this.getAI('hawking');
    if(hAI>0){
      this.hawking.zapCharge-=s*(hAI/20)*2;
      if(this.hawking.zapCharge<=0&&!this.hawking.escaped){
        this.hawking.escaped=true;this.hawking.moveTimer=4+Math.random()*3;
      }
      if(this.hawking.escaped){this.hawking.moveTimer-=s;if(this.hawking.moveTimer<=0){this.doJumpscare('hawking');return;}}
    }
    if(this.gameHour>=6)this.doVictory();
  }

  doJumpscare(bot){if(this.state===ST.JUMPSCARE)return;this.jsBot=bot;this.jumpscareTimer=0;this.state=ST.JUMPSCARE;this.deaths++;SFX.jumpscare();this.save();}

  customClick(x,y){

      X.fillStyle='rgba(0,60,0,0.12)';X.fillRect(x,y,w,h);

    const blink2=Math.floor(tc*1.5)%2===0;

  drawCamRoom(camId,fx,fy,fw,fh,tc){
    switch(camId){
      case '7': drawRoomLibrary(fx,fy,fw,fh,tc); break;
      case '8': drawRoomDental(fx,fy,fw,fh,tc); break;
      case '10': drawRoomBedroom(fx,fy,fw,fh,tc); break;
      case '9': drawRoomPhone(fx,fy,fw,fh,tc); break;
      case '11': drawRoomPool(fx,fy,fw,fh,tc); break;
      case '3': drawRoomHallway(fx,fy,fw,fh,tc,'L'); break;
      case '5': drawRoomHallway(fx,fy,fw,fh,tc,'R'); break;
      case '4': drawRoomSupply(fx,fy,fw,fh,tc); break;
      case '6': drawRoomServer(fx,fy,fw,fh,tc); break;
      case '1':case '2': {
        drawRoomVent(fx,fy,fw,fh,tc,camId);
        break;
      }
      default: X.fillStyle='#040404';X.fillRect(fx,fy,fw,fh);
    }
    // Now draw characters if present
    const eCam=this.epsteinCam();

      const tw=Math.sin(tc*0.4)*0.3;
      drawEpstein(fx+fw*0.5,fy+fh*0.52,baseScale*1.1,0.9,tc);
    }
    if(camId==='6'){
      // Always visible in server room — dormant early nights, dangerous later
      const hAI2=this.getAI('hawking');
      const hAlpha=hAI2>0?0.92:0.55; // dim/dormant on nights 1-2
      const hScale=Math.min(fw,fh)*0.0028; // bigger, clearly visible
      drawHawking(fx+fw*0.5,fy+fh*0.54,hScale,hAlpha,tc);
      // "INACTIVE" label on night 1-2
      if(hAI2===0){
        X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(fx+fw*0.3,fy+fh*0.82,fw*0.4,fh*0.06);
        X.font='14px VT323';X.fillStyle='#334455';X.textAlign='center';X.textBaseline='middle';

      }
    }
    // Trump — always show in BOTH vent cams
    if(camId==='1'||camId==='2'){
      const tAI3=this.getAI('trump');
      const isActiveCam=(camId==='1'&&this.trump.activeVent==='L')||(camId==='2'&&this.trump.activeVent==='R');
      const isAttacking=this.trump.ventPhase===1&&isActiveCam;
      const isBanging=isAttacking&&(this.ventBangL||this.ventBangR);

      if(FACE.complete&&FACE.naturalWidth>0){
        X.save();
        if(isAttacking){
          // ATTACKING — face large and close, pulsing forward
          const bangOffset=isBanging?fh*0.06:0;
          const crawlPulse=1+Math.abs(Math.sin(tc*3))*0.08;
          const faceW=fw*(isBanging?0.55:0.38)*crawlPulse;
          const faceH=faceW;
          const fdx=fx+fw/2-faceW/2;
          const fdy=fy+fh*(isBanging?0.12:0.2)-bangOffset;
          X.globalAlpha=isBanging?0.98:0.92;
          X.drawImage(FACE,fdx,fdy,faceW,faceH);
          X.globalCompositeOperation='multiply';
          X.fillStyle=isBanging?'rgba(255,100,0,0.55)':'rgba(0,220,0,0.3)';
          X.fillRect(fdx,fdy,faceW,faceH);
          X.globalCompositeOperation='source-over';

            X.globalCompositeOperation='source-over';
          }
        } else {
          // DORMANT — face far away, small and dim, deep in tunnel

          const faceW2=fw*(tAI3>0?0.18:0.12);
          const fdx2=fx+fw/2-faceW2/2;
          const fdy2=fy+fh*0.1;
          X.globalAlpha=dormAlpha;
          X.drawImage(FACE,fdx2,fdy2,faceW2,faceW2);

          X.fillStyle='rgba(0,200,0,0.4)';
          X.fillRect(fdx2,fdy2,faceW2,faceW2);
          X.globalCompositeOperation='source-over';
          // Blinking eyes glow in dark
          if(Math.floor(tc*1.5)%2===0){
            X.globalAlpha=0.35;
            X.globalCompositeOperation='screen';
            X.fillStyle='rgba(255,50,0,0.6)';X.fillRect(fdx2,fdy2,faceW2,faceW2);
            X.globalCompositeOperation='source-over';
          }
          if(tAI3===0){
            X.globalAlpha=1;X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(fx+fw*0.2,fy+fh*0.82,fw*0.6,fh*0.06);
            X.font='13px VT323';X.fillStyle='#334433';X.textAlign='center';X.textBaseline='middle';
            X.fillText('WARDEN ACTIVATES NIGHT 2',fx+fw*0.5,fy+fh*0.85);
          }
        }
        X.globalAlpha=1;X.restore();
      } else {
        // Canvas-drawn fallback
        const tScale2=Math.min(fw,fh)*0.002*(isAttacking?1.6:0.8);
        drawTrump(fx+fw*0.5,fy+fh*(isAttacking?0.38:0.28),tScale2,isAttacking?0.95:0.45,tc);
      }
    }
    // SCP67 Kid — lurks in ONE hallway only (cam 3), gets closer each hour
    if(camId==='3'){
      const scpDist=Math.max(0.25,1-this.gameHour*0.12);

    this.btn(p.ventLBtn,this.ventLClosed?'▣ VENT L [SEALED]':'▢ VENT L [OPEN]',this.ventLClosed,this.ventBangL,this.getAI('trump')===0);
    this.btn(p.ventRBtn,this.ventRClosed?'▣ VENT R [SEALED]':'▢ VENT R [OPEN]',this.ventRClosed,this.ventBangR,this.getAI('trump')===0);
    // Suffocation bar

    if(spct>0){
      const bx2=p.ventRBtn.x+p.ventRBtn.w+14;
      this.bx(bx2,p.ventLBtn.y,110,38,'#0a0000','#440000');
      this.bx(bx2+2,p.ventLBtn.y+2,Math.max(0,106*spct),34,'#660000',null);
      this.t('OXYGEN',bx2+55,p.ventLBtn.y+12,10,'#993300');
      this.t(`${((1-spct)*100).toFixed(0)}%`,bx2+55,p.ventLBtn.y+27,13,spct>0.6?'#ff2200':'#993300');
    }
    // HUD right side
    const hx=W-10;
    const pct=this.power/100;const pc=pct>0.5?'#00aa00':pct>0.25?'#aaaa00':'#cc2200';
    this.bx(hx-180,p.y+10,180,18,'#0a0a0a','#1a1a1a');
    this.bx(hx-178,p.y+12,Math.max(0,176*pct),14,pc,null);
    this.t(`PWR ${this.power.toFixed(0)}%`,hx-90,p.y+19,12,pc);
    const hrs=['12:00 AM','1:00 AM','2:00 AM','3:00 AM','4:00 AM','5:00 AM','6:00 AM'];
    this.gl('#ffcc00',8);this.t(hrs[Math.min(this.gameHour,6)],hx-90,p.y+42,22,'#ffcc00','center','VT323');this.ng();
    this.t(`NIGHT ${this.night}`,hx-90,p.y+62,13,'#664400','center','VT323');
    // Hawking zap charge
    {// Always show Hawking zap meter
      const zpct=this.hawking.zapCharge/100;
      const hActive=this.getAI('hawking')>0;
      const zc=!hActive?'#223344':zpct>0.4?'#4488ff':zpct>0.2?'#aaaa00':'#ff4400';
      this.bx(hx-110,p.y+78,100,14,'#0a0a0a',hActive?'#1a1a2a':'#111');
      if(hActive)this.bx(hx-108,p.y+80,Math.max(0,96*zpct),10,zc,null);
      this.t(hActive?'ZAP CHG':'HAWKING N3+',hx-60,p.y+85,9,zc);
    }
    if(this.electroFlash>0){X.fillStyle=`rgba(40,80,255,${this.electroFlash*0.2})`;X.fillRect(0,0,W,H);}
    if(this.bangFlash>0){X.fillStyle=`rgba(255,80,0,${this.bangFlash*0.12})`;X.fillRect(0,0,W,H);}
    this.t('[V]VentL [B]VentR [Z]Zap [M]Mute',W/2,H-12,10,'#1e2a1e');
  }

  renderCRT(){
    X.fillStyle='rgba(0,0,0,0.1)';for(let y=0;y<H;y+=3)X.fillRect(0,y,W,1);
    mkGrain();X.globalAlpha=0.03;X.drawImage(GR,0,0,W,H);X.globalAlpha=1;
    const tc=performance.now()/1000;
    const vg=X.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.75);
    vg.addColorStop(0,`rgba(0,255,0,${0.008+0.01*Math.sin(tc*13)})`);
    vg.addColorStop(0.5,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.55)');
    X.fillStyle=vg;X.fillRect(0,0,W,H);
  }

  renderJumpscare(){
    const t=this.jumpscareTimer;
    const bot=this.jsBot;
    const flash=Math.floor(t*20)%2===0;
    const decay=Math.max(0,1-t*0.45);

    // ── PER-BOT BG COLOR ────────────────────────────────────
    const bgCols={epstein:flash?'#880000':'#000',trump:flash?'#663300':'#000',
      hawking:flash?'#001144':'#000',suffocate:flash?'#001100':'#000'};
    X.fillStyle=bgCols[bot]||'#000'; X.fillRect(0,0,W,H);

    // ── EPSTEIN — face PNG full slam ────────────────────────
    if(bot==='epstein'){
      if(FACE.complete&&FACE.naturalWidth>0){
        X.save();
        const tx=(Math.random()-0.5)*60*decay+(Math.random()-0.5)*14;
        const ty=(Math.random()-0.5)*45*decay+(Math.random()-0.5)*10;
        const rot=(Math.random()-0.5)*0.22*decay;
        const sz=Math.min(W*0.68,H*0.94);
        X.translate(W/2+tx,H/2+ty);X.rotate(rot);
        X.drawImage(FACE,-sz/2,-sz/2,sz,sz);
        X.globalCompositeOperation='multiply';
        X.fillStyle=`rgba(255,40,40,${0.45+Math.random()*0.25})`;
        X.fillRect(-sz/2,-sz/2,sz,sz);
        X.globalCompositeOperation='source-over';
        X.restore();
        // Chromatic ghost copies
        X.save();X.globalAlpha=0.2;X.globalCompositeOperation='screen';
        const sz2=Math.min(W*0.68,H*0.94);
        X.drawImage(FACE,W/2-sz2/2-16,H/2-sz2/2,sz2,sz2);
        X.drawImage(FACE,W/2-sz2/2+16,H/2-sz2/2+10,sz2,sz2);
        X.globalCompositeOperation='source-over';X.globalAlpha=1;X.restore();
      }
    }

    // ── TRUMP — face PNG from vent angle (low, rising up) ──
    if(bot==='trump'){
      if(FACE.complete&&FACE.naturalWidth>0){
        X.save();
        // Rises up from bottom as if crawling out of vent
        const riseY=H*(0.9-t*0.25)+((Math.random()-0.5)*30*decay);
        const riseScale=0.5+t*0.18;
        const sz=Math.min(W*0.7,H*0.9)*riseScale;
        const tx2=(Math.random()-0.5)*40*decay;
        X.translate(W/2+tx2,riseY);
        X.rotate((Math.random()-0.5)*0.15*decay);
        X.drawImage(FACE,-sz/2,-sz/2,sz,sz);
        X.globalCompositeOperation='multiply';
        X.fillStyle=`rgba(255,120,40,${0.4+Math.random()*0.2})`;
        X.fillRect(-sz/2,-sz/2,sz,sz);
        X.globalCompositeOperation='source-over';
        X.restore();
      }
      // Vent grate shattering effect
      if(t<1.0){
        X.fillStyle=`rgba(80,50,20,${0.3*(1-t)})`;
        for(let i=0;i<20;i++){
          const angle=Math.random()*Math.PI*2;
          const dist=t*W*0.6;
          X.fillRect(W/2+Math.cos(angle)*dist,H/2+Math.sin(angle)*dist,8,4);
        }
      }
    }

    // ── HAWKING — blue electric flash + face PNG ────────────
    if(bot==='hawking'){
      // Electric arc background
      X.fillStyle=`rgba(0,40,120,${0.3+Math.sin(t*30)*0.2})`;X.fillRect(0,0,W,H);
      // Arcing lines
      X.strokeStyle=`rgba(100,150,255,${0.6+Math.sin(t*40)*0.3})`;X.lineWidth=2;
      for(let i=0;i<16;i++){
        X.beginPath();X.moveTo(W/2,H/2);
        let px=W/2,py=H/2;
        for(let s=0;s<12;s++){px+=(Math.random()-0.5)*80;py+=(Math.random()-0.5)*60;X.lineTo(px,py);}
        X.stroke();
      }
      if(FACE.complete&&FACE.naturalWidth>0){
        X.save();
        const tx3=(Math.random()-0.5)*50*decay,ty3=(Math.random()-0.5)*40*decay;
        const sz3=Math.min(W*0.62,H*0.88);
        X.translate(W/2+tx3,H/2+ty3);X.rotate((Math.random()-0.5)*0.18*decay);
        X.drawImage(FACE,-sz3/2,-sz3/2,sz3,sz3);
        X.globalCompositeOperation='multiply';
        X.fillStyle=`rgba(40,80,255,${0.45+Math.random()*0.2})`;
        X.fillRect(-sz3/2,-sz3/2,sz3,sz3);
        X.globalCompositeOperation='source-over';
        X.restore();
      }
    }

    // ── SUFFOCATE — darkness closing in, no face ────────────
    if(bot==='suffocate'){
      // Dark closing vignette with faint oxygen reading
      const vg2=X.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.4*(1-t*0.15));
      vg2.addColorStop(0,'rgba(0,20,0,0.6)');vg2.addColorStop(1,'rgba(0,0,0,0.99)');
      X.fillStyle=vg2;X.fillRect(0,0,W,H);
      this.gl('#00ff00',8);
      this.t('OXYGEN: 0%',W/2,H*0.42,32,'#003300','center','VT323');
      this.ng();
      if(t<1.5){this.gl('#00aa00',15);this.t('CLOSE THE VENTS...',W/2,H*0.55,28,'#005500','center','VT323');this.ng();}
    }

    // ── COMMON POST FX ──────────────────────────────────────
    // Heavy static blast
    mkGrain();X.globalAlpha=0.5;X.drawImage(GR,0,0,W,H);X.globalAlpha=1;
    // Horizontal glitch slices
    for(let i=0;i<14;i++){
      const gy=Math.random()*H,gh=1+Math.random()*6;
      X.save();X.globalAlpha=0.45+Math.random()*0.4;
      X.drawImage(C,0,gy,W,gh,(Math.random()-0.5)*50,gy,W,gh);
      X.globalAlpha=1;X.restore();
    }
    // Vignette
    const vgF=X.createRadialGradient(W/2,H/2,H*0.05,W/2,H/2,W*0.66);
    vgF.addColorStop(0,'rgba(0,0,0,0)');vgF.addColorStop(1,'rgba(0,0,0,0.82)');
    X.fillStyle=vgF;X.fillRect(0,0,W,H);

    // ── GAME OVER TEXT ──────────────────────────────────────
    if(t>1.6){
      const bname={epstein:'67 BOI',trump:'THE WARDEN',hawking:'STEPHEN H.',suffocate:'SUFFOCATED'}[bot]||'IT';
      const tcol={epstein:'#ff3333',trump:'#ff8833',hawking:'#4488ff',suffocate:'#33cc33'}[bot]||'#ff3333';
      this.gl('#fff',40);
      this.t('GAME OVER',W/2,H*0.1,Math.min(W*0.07,76),'#fff','center','Creepster');
      this.ng();
      this.gl(tcol,20);
      this.t(`CAUGHT BY: ${bname}`,W/2,H*0.86,24,tcol,'center','VT323');
      this.ng();
      if(Math.floor(t*3)%2===0)this.t('CLICK TO CONTINUE',W/2,H*0.93,17,'#884444','center','VT323');
    }
    this.renderCRT();
  }

  renderTitle(){
    const tc=performance.now()/1000;
    X.fillStyle='#000';X.fillRect(0,0,W,H);
    // Draw all 4 characters faintly in background
    X.globalAlpha=0.07;
    drawEpstein(W*0.12,H*0.55,H*0.0014,1,tc);
    drawSCP67(W*0.35,H*0.6,H*0.0012,1,tc);
    drawTrump(W*0.65,H*0.55,H*0.0014,1,tc);
    drawHawking(W*0.88,H*0.6,H*0.0012,1,tc);
    X.globalAlpha=1;
    // Vignette
    const vg=X.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.8);
    vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.92)');
    X.fillStyle=vg;X.fillRect(0,0,W,H);
    this.gl('#00ff00',35);
    this.t('FIVE NIGHTS',W/2,H*0.3,Math.min(W*0.085,88),'#00cc00','center','Creepster');
    this.t('AT 67 BOI',W/2,H*0.44,Math.min(W*0.085,88),'#00cc00','center','Creepster');
    this.ng();
    this.t('SURVIVAL HORROR',W/2,H*0.56,16,'#2a4a2a');
    const pulse=Math.sin(tc*2.2)*0.35+0.65;
    this.gl('#00ff00',6);
    this.t('CLICK OR PRESS SPACE TO BEGIN',W/2,H*0.7,18,`rgba(0,${Math.floor(200*pulse)},0,${pulse})`,'center','VT323');
    this.ng();
    this.t(`${this.completedNights.length}/5 nights cleared  ·  ${this.deaths} deaths`,W/2,H*0.82,13,'#1f2a1f');
    this.renderCRT();
  }

  renderMenu(){
    X.fillStyle='#000';X.fillRect(0,0,W,H);
    X.globalAlpha=0.05;
    drawEpstein(W*0.15,H*0.5,H*0.001,1,performance.now()/1000);
    drawHawking(W*0.85,H*0.5,H*0.001,1,performance.now()/1000);
    X.globalAlpha=1;
    this.gl('#00ff00',15);this.t('MAIN MENU',W/2,H*0.2,48,'#00cc00','center','Creepster');this.ng();
    this.menuBtns().forEach(b=>{
      const en=b.enabled!==false;
      this.bx(b.x,b.y,b.w,b.h,en?'#001500':'#0d0d0d',en?'#004400':'#1a1a1a');
      this.t(b.label,b.x+b.w/2,b.y+b.h/2,16,en?'#00cc00':'#2a3a2a');
    });
    this.t('NIGHTS CLEARED:',W/2,H*0.76,14,'#2a4a2a');
    for(let n=1;n<=5;n++){
      const nx=W/2-120+(n-1)*60,ny=H*0.84;
      const done=this.completedNights.includes(n),un=n<=this.unlockedNight;
      this.bx(nx-18,ny-18,36,36,done?'#001800':un?'#0a0a0a':'#050505',done?'#00ff00':un?'#2a2a2a':'#111');
      this.t(`${n}`,nx,ny,18,done?'#00ff00':un?'#333':'#1a1a1a','center','VT323');
    }
    this.t('[M] mute',W/2,H*0.95,11,'#1a2a1a');
    this.renderCRT();
  }

  renderCustom(){
    X.fillStyle='#000';X.fillRect(0,0,W,H);
    this.gl('#00ff00',15);this.t('CUSTOM NIGHT',W/2,H*0.12,48,'#00cc00','center','Creepster');this.ng();
    this.t('Set AI levels (0=off, 20=max)',W/2,H*0.21,15,'#2a4a2a');
    // Draw character sprites next to their sliders
    const rows=[
      {name:'epstein',label:'67 BOI',draw:(x,y,s)=>drawEpstein(x,y,s,1,performance.now()/1000),col:'#d4c040'},
      {name:'trump',label:'THE WARDEN',draw:(x,y,s)=>drawTrump(x,y,s,1,performance.now()/1000),col:'#e88840'},
      {name:'hawking',label:'STEPHEN H.',draw:(x,y,s)=>drawHawking(x,y,s,1,performance.now()/1000),col:'#4488ff'},
    ];
    rows.forEach((r,i)=>{
      const ry=H*0.35+i*80;
      r.draw(W*0.15,ry,H*0.0007);
      this.t(r.label,W*0.28,ry,18,r.col,'right','VT323');
      this.bx(W*0.33,ry-20,36,36,'#1a0000','#440000');
      this.t('−',W*0.348,ry,22,'#ff4444');
      this.gl('#00ff00',8);this.t(`${this.customAI[r.name]}`,W*0.5,ry,28,'#00ff00');this.ng();
      this.bx(W*0.56,ry-20,36,36,'#001a00','#004400');
      this.t('+',W*0.578,ry,22,'#00ff00');
      const bw=180;this.bx(W*0.63,ry-7,bw,12,'#0a0a0a','#1a1a1a');
      this.bx(W*0.632,ry-5,Math.max(0,(bw-4)*(this.customAI[r.name]/20)),8,r.col,null);
    });
    this.bx(W/2-110,H*0.78,220,40,'#001a00','#00aa00');
    this.gl('#00ff00',10);this.t('▶ START',W/2,H*0.8,22,'#00ff00');this.ng();
    this.bx(W/2-80,H*0.87,160,38,'#0d0d0d','#333');this.t('← BACK',W/2,H*0.89,18,'#555');
    this.renderCRT();
  }

  renderIntro(){
    const tc=performance.now()/1000;
    X.fillStyle='#000';X.fillRect(0,0,W,H);
    const vg=X.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,W*0.7);
    vg.addColorStop(0,'rgba(0,18,0,0.6)');vg.addColorStop(1,'rgba(0,0,0,0.95)');
    X.fillStyle=vg;X.fillRect(0,0,W,H);
    this.gl('#00ff00',20);this.t(`NIGHT ${this.night}`,W/2,H*0.1,68,'#00cc00','center','Creepster');this.ng();
    this.bx(W/2-44,H*0.2,88,128,'#001200','#00aa00',2);
    const pulse=Math.sin(tc*3)*0.4+0.6;
    this.gl('#00ff00',10+pulse*15);this.t('📞',W/2,H*0.29,40,'#fff');this.ng();
    this.t('INCOMING CALL',W/2,H*0.41,13,'#004400','center','VT323');
    const lines=this.wrapT(this.typedText||'...', 22, W*0.55);
    const bh2=lines.length*30+34;
    this.bx(W*0.22,H*0.48,W*0.56,bh2,'rgba(0,7,0,0.93)','#002200',2);
    X.fillStyle='#00dd00';X.font='22px VT323';X.textAlign='left';X.textBaseline='top';
    lines.forEach((l,i)=>X.fillText(l,W*0.22+14,H*0.48+16+i*30));
    if(Math.floor(tc*2)%2===0)this.t('CLICK OR SPACE TO SKIP',W/2,H*0.9,14,'#2a4a2a','center','VT323');
    this.renderCRT();
  }

  renderVictory(){
    const tc=performance.now()/1000;
    X.fillStyle='#000';X.fillRect(0,0,W,H);
    for(let i=0;i<50;i++){X.fillStyle=`rgba(255,200,50,${(Math.sin(tc*1.5+i)*0.4+0.6)*0.6})`;X.fillRect((Math.sin(i*997+tc*0.3)*0.4+0.5)*W,(Math.cos(i*7919+tc*0.2)*0.4+0.5)*H,2,2);}
    this.gl('#ffdd00',30);this.t('6:00 AM',W/2,H*0.28,100,'#ffcc00','center','Creepster');this.ng();
    this.gl('#ffaa00',12);this.t(`NIGHT ${this.night} COMPLETE`,W/2,H*0.48,44,'#ffaa00','center','VT323');this.ng();
    this.t(`Power: ${this.power.toFixed(1)}%  ·  Deaths: ${this.deaths}`,W/2,H*0.6,22,'#887700','center','VT323');
    if(this.night<5)this.t(`NIGHT ${this.night+1} UNLOCKED`,W/2,H*0.7,26,'#00aa00','center','VT323');
    else{this.gl('#ff8800',20);this.t('ALL NIGHTS CLEARED!',W/2,H*0.7,32,'#ff8800','center','VT323');this.ng();}
    if(Math.floor(tc*2)%2===0)this.t('CLICK TO CONTINUE',W/2,H*0.85,20,'#445544','center','VT323');
    this.renderCRT();
  }

  render(){
    X.save();X.translate(Math.round(this.shakeX),Math.round(this.shakeY));
    X.fillStyle='#000';X.fillRect(0,0,W,H);
    switch(this.state){
      case ST.LOADING: this.gl('#00ff00',15);this.t('LOADING...',W/2,H/2,48,'#00ff00','center','VT323');this.ng();break;
      case ST.TITLE: this.renderTitle();break;
      case ST.MENU: this.renderMenu();break;
      case ST.CUSTOM: this.renderCustom();break;
      case ST.INTRO: this.renderIntro();break;
      case ST.PLAYING:{const l=this.getLayout();this.renderFeed(l);this.renderPanel(l);this.renderCRT();break;}
      case ST.JUMPSCARE: this.renderJumpscare();break;
      case ST.VICTORY: this.renderVictory();break;
      case ST.GAMEOVER:
        X.fillStyle='#0a0000';X.fillRect(0,0,W,H);
        this.gl('#ff0000',20);this.t('GAME OVER',W/2,H*0.38,80,'#cc0000','center','Creepster');this.ng();
        this.t(`Night ${this.night}  ·  ${this.deaths} death${this.deaths!==1?'s':''}`,W/2,H*0.55,28,'#550000','center','VT323');
        if(Math.floor(performance.now()/600)%2===0)this.t('CLICK TO CONTINUE',W/2,H*0.68,20,'#440000','center','VT323');
        this.renderCRT();break;
    }
    X.restore();
  }
  loop(ts){const dt=this.lastTime?ts-this.lastTime:0;this.lastTime=ts;this.update(Math.min(dt,100));this.render();requestAnimationFrame(t=>this.loop(t));}
}

const game=new Game();
</script>
</body>
